<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Olgadeth — Biomedical Engineer</title>
<style>
:root{
  --bg-0:#050810;
  --bg-1:#080d1a;
  --bg-2:#0c1526;
  --panel: rgba(255,255,255,0.045);
  --panel-strong: rgba(255,255,255,0.075);
  --border: rgba(120,200,255,0.14);
  --border-strong: rgba(120,200,255,0.3);
  --cyan:#2fe6d4;
  --cyan-soft:#7df3e6;
  --blue:#4f9dff;
  --violet:#8b7bff;
  --text-0:#eef4fa;
  --text-1:#aebbd0;
  --text-2:#7c8aa3;
  --radius:18px;
  --shadow-glow: 0 0 40px rgba(47,230,212,0.08);
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
  background:
    radial-gradient(1200px 700px at 15% -10%, rgba(79,157,255,0.14), transparent 60%),
    radial-gradient(1000px 600px at 110% 10%, rgba(139,123,255,0.12), transparent 55%),
    radial-gradient(900px 700px at 50% 120%, rgba(47,230,212,0.10), transparent 60%),
    linear-gradient(180deg, var(--bg-0), var(--bg-1) 40%, var(--bg-2));
  color:var(--text-0);
  min-height:100vh;
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
::selection{background:rgba(47,230,212,0.3);color:#fff;}
::-webkit-scrollbar{width:10px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(120,200,255,0.25);border-radius:10px;}

/* background layers */
#bg-grid{position:fixed;inset:0;z-index:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(120,200,255,0.05) 1px, transparent 1px),
    linear-gradient(90deg, rgba(120,200,255,0.05) 1px, transparent 1px);
  background-size:46px 46px;
  mask-image:radial-gradient(ellipse 90% 70% at 50% 0%, black 10%, transparent 75%);
  animation:gridDrift 40s linear infinite;
}
@keyframes gridDrift{0%{background-position:0 0,0 0;}100%{background-position:46px 92px,46px 92px;}}
#particle-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.55;}

/* ---------- top nav ---------- */
header.topnav{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:14px 28px;
  background:rgba(6,10,20,0.65);
  backdrop-filter:blur(16px) saturate(140%);
  border-bottom:1px solid var(--border);
}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;letter-spacing:0.5px;cursor:pointer;}
.brand-mark{
  width:34px;height:34px;border-radius:10px;
  background:conic-gradient(from 210deg, var(--cyan), var(--blue), var(--violet), var(--cyan));
  display:flex;align-items:center;justify-content:center;
  font-size:15px;color:#04101a;font-weight:800;
  box-shadow:0 0 22px rgba(47,230,212,0.45);
  animation:spinSlow 8s linear infinite;
}
@keyframes spinSlow{0%{filter:hue-rotate(0deg);}100%{filter:hue-rotate(360deg);}}
.brand-text{font-size:15px;}
.brand-text small{display:block;font-weight:400;color:var(--text-2);font-size:11px;letter-spacing:1.5px;text-transform:uppercase;}

nav.tabs{display:flex;gap:4px;background:rgba(255,255,255,0.03);border:1px solid var(--border);
  padding:5px;border-radius:14px;position:relative;}
nav.tabs button{
  position:relative;z-index:2;
  border:none;background:transparent;color:var(--text-1);
  padding:9px 16px;font-size:13.5px;font-weight:600;border-radius:10px;
  cursor:pointer;transition:color .25s ease;white-space:nowrap;
}
nav.tabs button.active{color:#04141c;}
nav.tabs .pill-glide{
  position:absolute;top:5px;bottom:5px;left:5px;width:100px;border-radius:10px;
  background:linear-gradient(120deg, var(--cyan), var(--blue));
  box-shadow:0 0 20px rgba(47,230,212,0.5);
  transition:transform .35s cubic-bezier(.65,0,.35,1), width .35s cubic-bezier(.65,0,.35,1);
  z-index:1;
}
.nav-toggle{display:none;}

@media (max-width: 900px){
  nav.tabs{display:none;position:fixed;top:64px;left:12px;right:12px;flex-direction:column;
    background:#0a0f1c;border:1px solid var(--border-strong);box-shadow:0 20px 50px rgba(0,0,0,0.5);z-index:99;}
  nav.tabs.open{display:flex;}
  nav.tabs button{text-align:left;color:var(--text-1);}
  nav.tabs .pill-glide{display:none;}
  nav.tabs button.active{color:var(--cyan);background:rgba(47,230,212,0.08);}
  .nav-toggle{display:flex;align-items:center;justify-content:center;width:38px;height:38px;
    border-radius:10px;border:1px solid var(--border);background:rgba(255,255,255,0.03);color:var(--text-0);cursor:pointer;}
}

/* ---------- layout ---------- */
main{position:relative;z-index:1;max-width:1180px;margin:0 auto;padding:0 24px 100px;}
.panel{display:none;animation:fadeUp .55s ease both;}
.panel.active{display:block;}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px);}to{opacity:1;transform:translateY(0);}}

section{margin-top:64px;}
.section-head{margin-bottom:28px;}
.eyebrow{display:inline-flex;align-items:center;gap:8px;font-size:12px;letter-spacing:2px;
  text-transform:uppercase;color:var(--cyan-soft);font-weight:700;margin-bottom:10px;}
.eyebrow::before{content:"";width:20px;height:2px;background:var(--cyan);display:inline-block;border-radius:2px;}
h2.section-title{font-size:clamp(24px,3.4vw,34px);margin:0 0 8px;letter-spacing:-0.5px;}
p.section-sub{color:var(--text-1);max-width:640px;line-height:1.6;margin:0;}

/* ---------- HERO ---------- */
.hero{
  display:grid;grid-template-columns:1.1fr 0.9fr;gap:40px;align-items:center;
  padding:70px 0 30px;min-height:60vh;
}
@media (max-width:860px){.hero{grid-template-columns:1fr;padding-top:40px;}}
.hero-eyebrow{display:inline-flex;gap:8px;align-items:center;padding:6px 14px;border-radius:100px;
  border:1px solid var(--border-strong);background:rgba(47,230,212,0.06);font-size:12.5px;color:var(--cyan-soft);
  margin-bottom:22px;font-weight:600;}
.dot-live{width:7px;height:7px;border-radius:50%;background:#39ffb0;box-shadow:0 0 10px #39ffb0;animation:pulse 1.6s ease-in-out infinite;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.3;}}
.hero h1{font-size:clamp(34px,5.4vw,58px);line-height:1.05;margin:0 0 18px;letter-spacing:-1.5px;}
.hero h1 .grad{background:linear-gradient(100deg,var(--cyan),var(--blue) 45%,var(--violet));
  -webkit-background-clip:text;background-clip:text;color:transparent;}
.hero p.lead{color:var(--text-1);font-size:17px;line-height:1.7;max-width:520px;margin:0 0 30px;}
.hero-tags{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:34px;}
.chip{padding:6px 13px;border-radius:100px;border:1px solid var(--border);background:var(--panel);
  font-size:12.5px;color:var(--text-1);font-weight:600;}
.hero-cta{display:flex;gap:14px;flex-wrap:wrap;}
.btn{
  border:none;cursor:pointer;font-weight:700;font-size:14.5px;border-radius:12px;
  padding:13px 24px;display:inline-flex;align-items:center;gap:9px;
  transition:transform .25s ease, box-shadow .25s ease, background .25s ease;
  position:relative;overflow:hidden;
}
.btn.primary{background:linear-gradient(120deg,var(--cyan),var(--blue));color:#041018;
  box-shadow:0 8px 26px rgba(47,230,212,0.28);}
.btn.primary:hover{transform:translateY(-3px);box-shadow:0 14px 34px rgba(47,230,212,0.4);}
.btn.ghost{background:rgba(255,255,255,0.04);color:var(--text-0);border:1px solid var(--border-strong);}
.btn.ghost:hover{transform:translateY(-3px);background:rgba(255,255,255,0.08);border-color:var(--cyan);}
.btn .ripple{position:absolute;border-radius:50%;background:rgba(255,255,255,0.5);transform:scale(0);
  animation:rip .6s ease-out;pointer-events:none;}
@keyframes rip{to{transform:scale(3);opacity:0;}}

/* 3D floating molecule */
.molecule-wrap{position:relative;height:420px;display:flex;align-items:center;justify-content:center;perspective:1000px;}
.molecule{position:relative;width:280px;height:280px;transform-style:preserve-3d;animation:orbit 16s linear infinite;}
@keyframes orbit{from{transform:rotateX(55deg) rotateZ(0deg);}to{transform:rotateX(55deg) rotateZ(360deg);}}
.ring{position:absolute;inset:0;border-radius:50%;border:1.5px solid rgba(120,200,255,0.35);}
.ring.r1{transform:rotateX(0deg);}
.ring.r2{transform:rotateY(60deg);border-color:rgba(47,230,212,0.35);}
.ring.r3{transform:rotateY(-60deg);border-color:rgba(139,123,255,0.35);}
.atom{position:absolute;width:16px;height:16px;border-radius:50%;top:50%;left:50%;margin:-8px;
  box-shadow:0 0 18px currentColor;animation:atomPulse 3s ease-in-out infinite;}
@keyframes atomPulse{0%,100%{transform:scale(1);}50%{transform:scale(1.25);}}
.core{position:absolute;top:50%;left:50%;width:64px;height:64px;margin:-32px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%, #d8fff8, var(--cyan) 55%, #0aa896 100%);
  box-shadow:0 0 60px rgba(47,230,212,0.6), inset 0 0 25px rgba(255,255,255,0.5);
  animation:corePulse 4s ease-in-out infinite;
}
@keyframes corePulse{0%,100%{transform:scale(1) translateZ(0);}50%{transform:scale(1.06) translateZ(10px);}}
.float-badge{position:absolute;padding:9px 14px;border-radius:12px;background:var(--panel-strong);
  border:1px solid var(--border-strong);backdrop-filter:blur(10px);font-size:12px;font-weight:700;
  display:flex;align-items:center;gap:7px;animation:floaty 5s ease-in-out infinite;box-shadow:var(--shadow-glow);}
.float-badge svg{width:14px;height:14px;}
.fb1{top:2%;left:-8%;animation-delay:.2s;}
.fb2{bottom:8%;right:-10%;animation-delay:1.1s;}
.fb3{bottom:-4%;left:8%;animation-delay:2s;}
@keyframes floaty{0%,100%{transform:translateY(0px);}50%{transform:translateY(-12px);}}

/* ---------- stat / education cards ---------- */
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
@media (max-width:760px){.grid-3{grid-template-columns:1fr 1fr;}.grid-2{grid-template-columns:1fr;}}
@media (max-width:520px){.grid-3{grid-template-columns:1fr;}}

.card{
  background:var(--panel);border:1px solid var(--border);border-radius:var(--radius);
  padding:22px;transition:transform .35s ease, border-color .35s ease, box-shadow .35s ease;
  will-change:transform;
}
.card:hover{border-color:var(--border-strong);box-shadow:0 20px 50px -20px rgba(47,230,212,0.35);}
.stat-num{font-size:30px;font-weight:800;background:linear-gradient(100deg,var(--cyan),var(--blue));
  -webkit-background-clip:text;background-clip:text;color:transparent;}
.stat-label{color:var(--text-2);font-size:13px;margin-top:4px;}

.edu-card{display:flex;gap:16px;align-items:flex-start;}
.edu-icon{width:46px;height:46px;flex:none;border-radius:12px;display:flex;align-items:center;justify-content:center;
  background:linear-gradient(135deg,rgba(47,230,212,0.18),rgba(79,157,255,0.18));border:1px solid var(--border-strong);font-size:20px;}
.edu-card h4{margin:0 0 4px;font-size:15.5px;}
.edu-card p{margin:0;color:var(--text-2);font-size:13.5px;}

/* ---------- timeline (experience) ---------- */
.timeline{position:relative;padding-left:28px;}
.timeline::before{content:"";position:absolute;left:6px;top:6px;bottom:6px;width:2px;
  background:linear-gradient(180deg,var(--cyan),var(--blue) 50%,transparent);}
.tl-item{position:relative;margin-bottom:16px;}
.tl-dot{position:absolute;left:-28px;top:22px;width:14px;height:14px;border-radius:50%;
  background:var(--bg-1);border:2px solid var(--cyan);box-shadow:0 0 12px rgba(47,230,212,0.6);}
.exp-card{cursor:pointer;}
.exp-head{display:flex;justify-content:space-between;gap:16px;align-items:flex-start;flex-wrap:wrap;}
.exp-head h3{margin:0 0 4px;font-size:18px;}
.exp-head .role{color:var(--cyan-soft);font-weight:600;font-size:13.5px;}
.exp-meta{display:flex;flex-direction:column;align-items:flex-end;color:var(--text-2);font-size:12.5px;gap:3px;flex:none;}
.exp-toggle{width:30px;height:30px;border-radius:8px;background:rgba(255,255,255,0.05);
  border:1px solid var(--border);display:flex;align-items:center;justify-content:center;flex:none;
  transition:transform .35s ease, background .25s ease;}
.exp-card.open .exp-toggle{transform:rotate(45deg);background:rgba(47,230,212,0.15);border-color:var(--cyan);}
.exp-summary{color:var(--text-1);font-size:14px;line-height:1.65;margin-top:12px;}
.exp-body{max-height:0;overflow:hidden;transition:max-height .5s cubic-bezier(.65,0,.35,1);}
.exp-card.open .exp-body{max-height:2400px;}
.exp-sub{margin-top:16px;padding-top:14px;border-top:1px dashed var(--border);}
.exp-sub h5{margin:0 0 6px;color:var(--cyan-soft);font-size:13px;letter-spacing:.3px;}
.exp-sub p{margin:0;color:var(--text-1);font-size:13.5px;line-height:1.65;}

/* ---------- pills / filter ---------- */
.pillbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:26px;}
.pillbtn{padding:9px 18px;border-radius:100px;border:1px solid var(--border);background:var(--panel);
  color:var(--text-1);font-weight:700;font-size:13px;cursor:pointer;transition:all .25s ease;}
.pillbtn:hover{border-color:var(--cyan);color:var(--text-0);}
.pillbtn.active{background:linear-gradient(120deg,var(--cyan),var(--blue));color:#04141c;border-color:transparent;
  box-shadow:0 8px 22px rgba(47,230,212,0.3);}

.modality-panel{display:none;}
.modality-panel.active{display:block;animation:fadeUp .45s ease both;}
.evidence-block{margin-bottom:34px;}
.evidence-block h4{font-size:15.5px;margin:0 0 4px;color:var(--text-0);}
.evidence-block .outcome{color:var(--text-1);font-size:14px;line-height:1.7;margin:14px 0 0;}
.evidence-block .outcome strong{color:var(--cyan-soft);}

.gallery{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px;margin-top:12px;}
.gallery.wide{grid-template-columns:repeat(auto-fill,minmax(220px,1fr));}
.gimg{position:relative;border-radius:14px;overflow:hidden;border:1px solid var(--border);
  aspect-ratio:4/3;cursor:zoom-in;background:#0a1220;transform-style:preserve-3d;transition:transform .25s ease, box-shadow .25s ease, border-color .25s ease;}
.gimg img{width:100%;height:100%;object-fit:cover;display:block;transition:transform .5s ease, filter .4s ease;}
.gimg:hover img{transform:scale(1.08);}
.gimg:hover{border-color:var(--cyan);box-shadow:0 22px 45px -18px rgba(47,230,212,0.45);}
.gimg .zoom-ic{position:absolute;right:8px;bottom:8px;width:26px;height:26px;border-radius:8px;
  background:rgba(5,10,20,0.65);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;
  opacity:0;transform:translateY(6px);transition:all .25s ease;}
.gimg:hover .zoom-ic{opacity:1;transform:translateY(0);}

/* ---------- project cards ---------- */
.project{margin-bottom:44px;}
.project-top{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;flex-wrap:wrap;margin-bottom:8px;}
.project-title{font-size:22px;margin:0 0 6px;}
.project-tags{color:var(--text-2);font-size:12.5px;font-weight:600;letter-spacing:.3px;}
.project-body p{color:var(--text-1);font-size:14.5px;line-height:1.75;}
.project h4.mini{color:var(--cyan-soft);font-size:14px;margin:22px 0 8px;letter-spacing:.3px;}
.method-list{list-style:none;margin:0;padding:0;display:grid;gap:8px;}
.method-list li{position:relative;padding-left:22px;color:var(--text-1);font-size:14px;line-height:1.6;}
.method-list li::before{content:"";position:absolute;left:0;top:8px;width:9px;height:9px;border-radius:3px;
  background:linear-gradient(120deg,var(--cyan),var(--blue));transform:rotate(45deg);}
.outcome-list{list-style:none;margin:0;padding:0;display:grid;grid-template-columns:1fr 1fr;gap:8px;}
@media (max-width:640px){.outcome-list{grid-template-columns:1fr;}}
.outcome-list li{display:flex;gap:8px;align-items:flex-start;font-size:13.5px;color:var(--text-1);line-height:1.5;}
.outcome-list li .ck{flex:none;width:19px;height:19px;border-radius:6px;background:rgba(47,230,212,0.15);
  border:1px solid var(--cyan);display:flex;align-items:center;justify-content:center;color:var(--cyan);font-size:11px;margin-top:1px;}
.tech-table{width:100%;border-collapse:collapse;margin-top:6px;font-size:13.5px;}
.tech-table th{text-align:left;color:var(--text-2);font-weight:700;font-size:11.5px;text-transform:uppercase;
  letter-spacing:.6px;padding:8px 12px;border-bottom:1px solid var(--border-strong);}
.tech-table td{padding:9px 12px;border-bottom:1px solid var(--border);color:var(--text-1);}
.tech-table tr:hover td{background:rgba(47,230,212,0.04);color:var(--text-0);}
.skill-tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:6px;}

/* ---------- skills tab ---------- */
.skill-cat{margin-bottom:26px;}
.skill-cat h4{margin:0 0 12px;font-size:14.5px;color:var(--text-0);display:flex;align-items:center;gap:9px;}
.skill-cat h4 .ic{width:30px;height:30px;border-radius:9px;background:linear-gradient(135deg,rgba(47,230,212,0.2),rgba(139,123,255,0.2));
  border:1px solid var(--border-strong);display:flex;align-items:center;justify-content:center;font-size:14px;}
.tagcloud{display:flex;flex-wrap:wrap;gap:9px;}
.tagcloud span{padding:8px 14px;border-radius:100px;font-size:13px;font-weight:600;color:var(--text-1);
  background:var(--panel);border:1px solid var(--border);transition:all .25s ease;cursor:default;}
.tagcloud span:hover{color:#04141c;background:linear-gradient(120deg,var(--cyan),var(--blue));border-color:transparent;transform:translateY(-2px);}

/* ---------- contact ---------- */
.contact-wrap{display:grid;grid-template-columns:1.1fr 0.9fr;gap:24px;}
@media (max-width:800px){.contact-wrap{grid-template-columns:1fr;}}
.contact-card{padding:34px;}
.contact-row{display:flex;align-items:center;gap:14px;padding:14px 0;border-bottom:1px solid var(--border);}
.contact-row:last-child{border-bottom:none;}
.contact-ic{width:40px;height:40px;border-radius:11px;flex:none;background:linear-gradient(135deg,rgba(47,230,212,0.18),rgba(79,157,255,0.18));
  border:1px solid var(--border-strong);display:flex;align-items:center;justify-content:center;}
.contact-row a, .contact-row span.val{color:var(--text-0);font-weight:600;font-size:14.5px;text-decoration:none;}
.contact-row div small{display:block;color:var(--text-2);font-size:11.5px;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px;}

/* footer / back to top */
.backtop{position:fixed;right:22px;bottom:22px;width:46px;height:46px;border-radius:50%;
  background:linear-gradient(120deg,var(--cyan),var(--blue));border:none;color:#04141c;font-size:18px;
  display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 10px 30px rgba(47,230,212,0.4);
  z-index:60;opacity:0;pointer-events:none;transform:translateY(10px);transition:all .3s ease;}
.backtop.show{opacity:1;pointer-events:auto;transform:translateY(0);}
footer{text-align:center;color:var(--text-2);font-size:12.5px;padding:36px 0 10px;position:relative;z-index:1;}

/* lightbox */
.lightbox{position:fixed;inset:0;background:rgba(3,6,12,0.92);backdrop-filter:blur(8px);z-index:200;
  display:none;align-items:center;justify-content:center;flex-direction:column;padding:30px;}
.lightbox.show{display:flex;}
.lightbox img{max-width:min(90vw,1000px);max-height:78vh;border-radius:12px;box-shadow:0 30px 80px rgba(0,0,0,0.6);
  border:1px solid var(--border-strong);}
.lb-controls{display:flex;gap:14px;margin-top:18px;}
.lb-controls button{width:44px;height:44px;border-radius:50%;border:1px solid var(--border-strong);
  background:rgba(255,255,255,0.06);color:var(--text-0);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s ease;}
.lb-controls button:hover{background:var(--cyan);color:#04141c;}
.lb-close{position:absolute;top:22px;right:26px;}

/* reveal on scroll */
.reveal{opacity:0;transform:translateY(24px);transition:opacity .7s ease, transform .7s ease;}
.reveal.in{opacity:1;transform:translateY(0);}

.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);}
</style>
</head>
<body>

<canvas id="particle-canvas"></canvas>
<div id="bg-grid"></div>

<header class="topnav">
  <div class="brand" data-goto="home">
    <div class="brand-mark">OD</div>
    <div class="brand-text">Olgadeth<small>Biomedical Engineer</small></div>
  </div>
  <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">☰</button>
  <nav class="tabs" id="tabsNav">
